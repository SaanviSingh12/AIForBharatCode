AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Sahayak Healthcare Backend

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod

Resources:
  SahayakFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub sahayak-backend-${Environment}
      PackageType: Image
      Timeout: 900
      MemorySize: 2048
      Environment:
        Variables:
          PORT: "8080"
          AWS_LWA_INVOKE_MODE: response_stream
          SPRING_PROFILES_ACTIVE: !Ref Environment
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
      Policies:
        - Statement:
          - Effect: Allow
            Action:
              - bedrock:InvokeModel
              - polly:SynthesizeSpeech
              - textract:AnalyzeDocument
              - transcribe:StartTranscriptionJob
              - transcribe:GetTranscriptionJob
              - s3:PutObject
              - s3:GetObject
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: "*"
    Metadata:
      DockerTag: !Ref Environment
      DockerContext: ./
      Dockerfile: Dockerfile

  SahayakBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub sahayak-uploads-${Environment}-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

Outputs:
  ApiUrl:
    Description: "API Gateway URL"
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/"
  
  FunctionArn:
    Description: "Lambda Function ARN"
    Value: !GetAtt SahayakFunction.Arn
